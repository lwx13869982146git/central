server:
  port: 8082

spring:
  application:
    name: user-service
  config:
    import:
      - optional:nacos:user-service.yaml
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.132.100:8848
        namespace: public
        group: DEFAULT_GROUP
      config:
        server-addr: 192.168.132.100:8848
        file-extension: yaml
        namespace: public
        group: DEFAULT_GROUP
        refresh-enabled: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.132.100:3307/user?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: "Root@123456"

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.central.user.entity
  configuration:
    map-underscore-to-camel-case: true
